services:
  postgres:
    image: postgres:16-alpine
    container_name: mythwake-postgres
    environment:
      POSTGRES_DB: mythwake
      POSTGRES_USER: mythwake
      POSTGRES_PASSWORD: mythwake
    ports:
      - "5432:5432"
    volumes:
      - mythwake_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mythwake -d mythwake"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mythwake_postgres_data:
